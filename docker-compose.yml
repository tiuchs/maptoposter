services:
  maptoposter:
    # Published by .github/workflows/docker-publish.yml on every push to
    # main. No `build:` key on purpose: this file just pulls and runs the
    # prebuilt image, so it works with tools like Synology Container
    # Manager that don't have the repo's Dockerfile available to build
    # from. To build from source instead, see the Docker section of the
    # README.
    image: ghcr.io/tiuchs/maptoposter:latest
    ports:
      - "8000:8000"
    volumes:
      # Generated posters and OSM/geocoding caches persist on the host and
      # survive container rebuilds. Create these directories first (see
      # README) so they aren't bind-mounted into existence as root.
      - ./posters:/app/posters
      - ./cache:/app/cache
      - ./fonts/cache:/app/fonts/cache
    restart: unless-stopped
