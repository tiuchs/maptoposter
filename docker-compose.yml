services:
  maptoposter:
    # Published by .github/workflows/docker-publish.yml on every push to
    # main. `docker compose pull` fetches this instead of building locally;
    # `docker compose up --build` (or `build`) still builds from the local
    # Dockerfile and tags the result with this same name.
    image: ghcr.io/tiuchs/maptoposter:latest
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Generated posters and OSM/geocoding caches persist on the host and
      # survive container rebuilds. Create these directories first (see
      # README) so they aren't bind-mounted into existence as root.
      - ./posters:/app/posters
      - ./cache:/app/cache
      - ./fonts/cache:/app/fonts/cache
    restart: unless-stopped
